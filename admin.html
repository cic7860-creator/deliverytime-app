<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배차 데이터 입력 (관리자용)</title>
    <style>
        textarea { width: 100%; height: 200px; margin-top: 10px; padding: 10px; font-family: monospace;}
    </style>
</head>
<body>
    <h2>🚚 금일 배차 데이터 입력</h2>
    <p>엑셀에서 <b>[출발센터주소, 배송일자, 차량번호, 기사명, 매장코드, 매장명, 매장 주소, 배송순서, 상하차시간]</b> 영역을 포함하여 복사(Ctrl+C)한 뒤 붙여넣기 해주세요.</p>
    
    <form action="/admin" method="POST">
        <textarea name="excel_text" placeholder="여기에 엑셀 데이터를 붙여넣으세요..." required></textarea>
        <br><br>
        <button type="submit" style="padding: 10px 20px; font-size: 16px;">데이터 저장하기</button>
    </form>
</body>
</html>
