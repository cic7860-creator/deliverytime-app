<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배차 데이터 관리</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f8f9fa; margin: 0; }
        .top-nav { background-color: #212529; padding: 15px 20px; border-radius: 6px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .top-nav div { display: flex; gap: 20px; flex-wrap: wrap; }
        .top-nav a { color: #f8f9fa; text-decoration: none; font-size: 16px; font-weight: bold; }
        .top-nav a:hover { color: #0d6efd; }
        
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #082c84; }
        textarea { width: 100%; height: 100px; border: 1px solid #ced4da; padding: 10px; border-radius: 4px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; font-size: 14px; text-align: center; }
        th { background-color: #f8f9fa; color: #495057; }
        .btn-update { padding: 6px 12px; cursor: pointer; background-color: #198754; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .btn-primary { background-color: #082c84; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 💡 상단 네비게이션: 현재 접속 페이지 (admin) 노란색 강조 -->
        <div class="top-nav">
            <div>
                <a href="/admin" style="color: #ffe812;">🖥️ 데이터 입력 (홈)</a>
                <a href="/driver" target="_blank">📱 기사님 페이지</a>
                <a href="/dashboard">📊 실시간 대시보드</a>
                <a href="/sms">✉️ 도착안내 문자 발송</a>
                <a href="/notice">📢 공지사항 관리</a>
            </div>
            <a href="/admin_logout" style="color: #ff6b6b;">🚪 로그아웃</a>
        </div>
        
        <h2>배차 데이터 입력</h2>
        <form action="/admin" method="POST">
            <textarea name="excel_text" placeholder="데이터를 탭(Tab)으로 구분하여 붙여넣으세요..." required></textarea>
            <button type="submit" class="btn-primary" style="margin-top:10px;">저장 및 업데이트</button>
        </form>

        <h2>현재 배차 현황 (상하차 시간 및 양식 수정)</h2>
        <table>
            <tr>
                <th>기사명</th>
                <th>매장명</th>
                <th>순서</th>
                <th>상하차 시간(분)</th>
                <th>시간 수정</th>
                <th>문자 양식</th>
                <th>양식 수정</th>
            </tr>
            {% for d in dispatches %}
            <tr>
                <td>{{ d.driver_name }}</td>
                <td>{{ d.store_name }}</td>
                <td>{{ d.delivery_seq }}</td>
                
                <form action="/admin/update_buffer/{{ d.id }}" method="POST">
                    <td><input type="number" name="buffer_time" value="{{ d.buffer_time }}" style="width:60px; text-align:center;"></td>
                    <td><button type="submit" class="btn-update">적용</button></td>
                </form>
                
                <!-- 💡 신규: 매장별 문자 양식 이름 변경 폼 -->
                <form action="/admin/update_template/{{ d.id }}" method="POST">
                    <td><input type="text" name="template_name" value="{{ d.template_name or '' }}" placeholder="기본양식" style="width:100px; text-align:center;"></td>
                    <td><button type="submit" class="btn-update" style="background-color:#0d6efd;">양식변경</button></td>
                </form>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
